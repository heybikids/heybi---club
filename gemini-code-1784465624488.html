<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEYBI! | Little Adventure Club</title>
    <meta name="description" content="Little Adventure, Big Happiness. Temukan koleksi baju anak premium yang nyaman untuk si kecil.">
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Poppins for clean look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Loading Animation -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero fade-up">
            <img src="assets/logo/logo.png" alt="HEYBI Logo" class="logo">
            <h1>Little Adventure, Big Happiness</h1>
            <p>Dibuat untuk si kecil yang suka bermain dan berimajinasi.</p>
            <a href="#" id="shopee-btn-main" class="btn-main">🛍 Belanja di Shopee</a>
        </section>

        <!-- Highlight Section -->
        <section class="features">
            <div class="card fade-up">
                <div class="icon">🎨</div>
                <h3>Original Character</h3>
            </div>
            <div class="card fade-up">
                <div class="icon">☁️</div>
                <h3>Cotton Premium</h3>
            </div>
            <div class="card fade-up">
                <div class="icon">✨</div>
                <h3>Nyaman Dipakai</h3>
            </div>
        </section>

        <!-- Marketplace Section -->
        <section class="links-section">
            <h2 class="section-title">Temukan HEYBI di</h2>
            <div id="link-container">
                <!-- Links akan di-generate oleh JS -->
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <img src="assets/logo/logo-small.png" alt="Logo">
            <p><strong>Little Adventure Club</strong><br>Play • Explore • Imagine</p>
            <p class="copyright">© 2026 HEYBI!</p>
        </footer>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
